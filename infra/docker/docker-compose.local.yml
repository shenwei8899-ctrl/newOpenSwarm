version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: openswarm-saas-postgres
    environment:
      POSTGRES_DB: openswarm_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - openswarm_saas_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openswarm_saas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: openswarm-saas-redis
    ports:
      - "6379:6379"
    volumes:
      - openswarm_saas_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  openswarm_saas_postgres:
  openswarm_saas_redis:
